<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ExamPrep – EOS Study App</title>
  <meta name="description" content="A clean exam preparation app for End-of-Semester revision." />

  <!-- PWA: theme + manifest ------------------------------------------------ -->
  <meta name="theme-color" content="#1a4f3a" />
  <link rel="manifest" href="manifest.webmanifest" />

  <!-- PWA: iOS / Safari ---------------------------------------------------- -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="ExamPrep" />
  <link rel="apple-touch-icon" href="icon-192.png" />

  <!-- PWA: Windows / Edge tiles -------------------------------------------- -->
  <meta name="msapplication-TileColor" content="#1a4f3a" />
  <meta name="msapplication-TileImage" content="icon-192.png" />

  <!-- Fonts ---------------------------------------------------------------- -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Playfair+Display:wght@700&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;1,8..60,400&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Initial loading state — replaced immediately by app.js on DOMContentLoaded -->
  <div id="app">
    <div class="loading-screen">
      <div class="loading-spinner"></div>
      <p class="loading-msg">Starting up…</p>
    </div>
  </div>

  <noscript>
    <div class="loading-screen">
      <p class="error-icon">⚠️</p>
      <p class="loading-msg">JavaScript is required to run ExamPrep.</p>
    </div>
  </noscript>

  <script src="app.js"></script>
</body>
</html>
